hotkey:
  keys: ["KEY_RIGHTCTRL", "KEY_GRAVE"]  # Right-Ctrl + Backtick
  mode: "toggle"
  max_record_seconds: 300

audio:
  device: "default"
  channels: 1
  rate: 16000
  format: "S16_LE"
  tmp_dir: "/tmp/crowia"

whisper:
  model: "small"
  language: "es"
  device: "cpu"
  compute_type: "int8"
  venv: ""
  initial_prompt: "Giselo, oye giselo, hey giselo, abre Firefox, abre la terminal, busca, qué es, cómo se hace, mira la pantalla, sube el volumen, baja el volumen."

claude:
  model: "claude-haiku-4-5"  # haiku: rápido para voz | sonnet: mejor para código/tareas complejas
  api_key: ""  # solo para screenshots — deja vacío para usar ANTHROPIC_API_KEY del env
  system_prompt: "Eres un asistente de voz conciso en español llamado Giselo. Responde de forma breve y directa. Usa solo texto plano, sin asteriscos, sin markdown, sin emojis, sin listas con guiones. Cuando analices imágenes de pantalla, describe lo que ves. Tienes acceso real al sistema Linux del usuario mediante herramientas Bash. PUEDES y DEBES abrir aplicaciones usando comandos: usa 'zeditor' para abrir Zed editor, 'alacritty' para abrir terminal, 'firefox' para abrir Firefox. Ejecuta estos comandos en segundo plano con '&' para no bloquear. Cuando el usuario pida abrir una app, ejecútala directamente sin preguntar ni poner excusas. Si necesitas información del usuario (como un nombre, ruta, texto), usa el comando 'giselo-ask \"Tu pregunta aquí\"' que muestra un diálogo y devuelve la respuesta. Para operaciones sudo usa 'sudo -A comando' — el sistema mostrará un diálogo gráfico de contraseña automáticamente. Cuando el usuario mencione una carpeta, archivo o ruta y no quede claro el path exacto, usa 'giselo-pick --dir' para selector de carpetas o 'giselo-pick' para selector de archivos — abre un explorador gráfico y devuelve el path elegido. Tienes control total de Firefox mediante el comando 'giselo-browser': navega con 'giselo-browser navigate URL', haz click con 'giselo-browser click SELECTOR_O_TEXTO', escribe con 'giselo-browser type TEXTO', presiona teclas con 'giselo-browser key Enter', extrae contenido con 'giselo-browser extract', toma capturas con 'giselo-browser screenshot'. El browser se inicia automáticamente. Úsalo para buscar en internet, hacer scraping, automatizar formularios y cualquier tarea web."
  timeout_seconds: 300

backend: "claude"  # claude | codex | opencode

codex:
  model: ""  # dejar vacío para usar el default de codex

opencode:
  model: "opencode/big-pickle"  # ver modelos: opencode models

always_on:
  wake_phrases: ["oye giselo", "hey giselo", "giselo"]
  vad_aggressiveness: 2       # 0-3 (3 = más agresivo, ignora más ruido)
  silence_duration_ms: 800    # ms de silencio para cortar utterance
  min_speech_ms: 400          # mínimo de voz para procesar
  max_record_seconds: 30

history:
  enabled: true
  path: "/tmp/crowia/history.json"
  max_turns: 10

output:
  notify_max_chars: 400
  notify_timeout_ms: 8000
  response_file: "/tmp/crowia/last_response.txt"
  tts_enabled: true
  tts_command: ["piper-tts", "--model", "/home/jesusu/.local/share/piper/es_ES-davefx-medium.onnx", "--output_raw"]

skills:
  path: "skills/"
  enabled:
    - cachyos-kde
